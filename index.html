<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Camera</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --safe-top: env(safe-area-inset-top, 52px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
  --yellow: #FFD60A;
}
body {
  background:#000;
  width:100vw; height:100svh;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  color:#fff;
  user-select:none;
}

/* VIEWFINDER */
.viewfinder {
  position:absolute; inset:0;
  background:#080808;
  overflow:hidden;
}
video {
  width:100%; height:100%;
  object-fit:cover; display:block;
  transition:opacity 0.18s ease;
}

/* FOCUS RING */
.focus-ring {
  position:absolute;
  width:72px; height:72px;
  border:1.5px solid var(--yellow);
  border-radius:50%;
  transform:translate(-50%,-50%) scale(1);
  pointer-events:none;
  z-index:5; opacity:0;
  box-shadow:0 0 10px rgba(255,214,10,0.25);
}
.focus-ring.show { opacity:1; animation:focusIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
.focus-ring.fade { opacity:0; transition:opacity 1.2s; }
@keyframes focusIn {
  0%{transform:translate(-50%,-50%) scale(1.6);opacity:0}
  100%{transform:translate(-50%,-50%) scale(1);opacity:1}
}

/* REC TIMER */
.rec-timer {
  position:absolute;
  top:max(var(--safe-top),16px);
  left:50%; transform:translateX(-50%);
  background:rgba(255,59,48,0.88);
  border-radius:20px;
  padding:5px 14px;
  font-size:13px; font-weight:700; letter-spacing:0.5px;
  display:flex; align-items:center; gap:7px;
  z-index:21; opacity:0;
  transition:opacity 0.3s;
  pointer-events:none;
}
.rec-timer.show { opacity:1; }
.rec-dot { width:8px; height:8px; background:#fff; border-radius:50%; animation:blink 1s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* TOP RIGHT */
.top-controls-btn {
  position:absolute;
  top:max(var(--safe-top),16px); right:16px;
  z-index:20;
  width:38px; height:38px;
  border-radius:50%;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  border:1px solid rgba(255,255,255,0.15);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  transition:background 0.15s,transform 0.1s;
}
.top-controls-btn:active{transform:scale(0.88);background:rgba(255,255,255,0.2)}
.top-controls-btn svg{width:18px;height:18px}

/* QUALITY BADGE */
.quality-badge {
  position:absolute;
  top:max(var(--safe-top),16px); left:16px;
  z-index:20;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:14px;
  padding:7px 13px;
  font-size:12px; font-weight:600; letter-spacing:0.3px;
  color:rgba(255,255,255,0.85);
  cursor:pointer; transition:transform 0.1s,background 0.15s;
}
.quality-badge:active{transform:scale(0.92);background:rgba(255,255,255,0.2)}

/* ZOOM */
.zoom-row {
  position:absolute;
  bottom:172px; left:0; right:0;
  display:flex; align-items:center; justify-content:center;
  gap:6px; z-index:20;
}
.zoom-btn {
  background:none; border:none;
  color:rgba(255,255,255,0.55);
  font-size:14px; font-weight:600;
  padding:6px 10px; border-radius:50%;
  cursor:pointer; transition:all 0.18s;
  width:44px; height:44px;
  display:flex; align-items:center; justify-content:center;
}
.zoom-btn.active {
  background:rgba(30,30,30,0.75);
  color:var(--yellow);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.zoom-btn:active{transform:scale(0.88)}

/* SHUTTER AREA */
.shutter-area {
  position:absolute;
  bottom:0; left:0; right:0;
  padding-bottom:max(var(--safe-bottom),24px);
  z-index:20;
  display:flex; flex-direction:column; align-items:center;
}
.mode-row {
  display:flex; align-items:center; gap:4px;
  margin-bottom:18px;
}
.mode-chip {
  font-size:13px; font-weight:600;
  letter-spacing:0.8px; text-transform:uppercase;
  padding:7px 18px; border-radius:22px;
  cursor:pointer; color:rgba(255,255,255,0.45);
  transition:all 0.22s; background:none; border:none;
}
.mode-chip.active { color:#000; background:var(--yellow); box-shadow:0 2px 14px rgba(255,214,10,0.45); }
.mode-chip:active{transform:scale(0.93)}

.controls-row {
  display:flex; align-items:center; justify-content:space-between;
  width:100%; padding:0 40px;
}

/* Thumbnail */
.thumb {
  width:58px; height:58px; border-radius:14px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.28);
  background:rgba(255,255,255,0.07);
  cursor:pointer; transition:transform 0.12s;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  box-shadow:0 2px 14px rgba(0,0,0,0.5);
}
.thumb:active{transform:scale(0.9)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb svg{width:22px;height:22px;opacity:0.3}

/* Shutter */
.shutter-wrap {
  position:relative; width:86px; height:86px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.shutter-ring {
  position:absolute; inset:0; border-radius:50%;
  border:3px solid rgba(255,255,255,0.7);
}
.shutter-btn {
  width:70px; height:70px; border-radius:50%; border:none;
  background:rgba(255,255,255,0.93);
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
  cursor:pointer; transition:transform 0.08s,background 0.1s;
  position:relative; z-index:1;
}
.shutter-btn:active{transform:scale(0.87);background:rgba(255,255,255,0.75)}
.shutter-btn.video-mode { background:#FF3B30; box-shadow:0 4px 20px rgba(255,59,48,0.45); }
.shutter-btn.recording {
  background:#FF3B30;
}
.shutter-btn.recording::after {
  content:'';
  position:absolute;
  width:28px; height:28px;
  background:#fff; border-radius:7px;
  top:50%; left:50%; transform:translate(-50%,-50%);
}

/* Flip */
.flip-btn {
  width:58px; height:58px; border-radius:50%;
  background:rgba(255,255,255,0.13);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.18);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),background 0.2s;
  flex-shrink:0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.2),0 2px 12px rgba(0,0,0,0.3);
}
.flip-btn:active{background:rgba(255,255,255,0.25)}
.flip-btn.spin{transform:rotate(180deg)}
.flip-btn svg{width:22px;height:22px}

/* CAMERA ERROR MESSAGE */
.cam-error {
  position:absolute; inset:0;
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center; padding:0 32px;
  z-index:15; gap:10px;
  color:rgba(255,255,255,0.85);
}
.cam-error.show{display:flex}
.cam-error svg{width:40px;height:40px;opacity:0.6;margin-bottom:6px}
.cam-error b{font-size:15px;font-weight:600;color:#fff}
.cam-error span{font-size:13px;line-height:1.5;color:rgba(255,255,255,0.6);max-width:280px}
/* CAPTURE FLASH */
.capture-flash {
  position:absolute; inset:0;
  background:#fff; opacity:0;
  pointer-events:none; z-index:30;
}
.capture-flash.go{animation:cflash 0.2s ease-out forwards}
@keyframes cflash{0%{opacity:0.92}100%{opacity:0}}

/* TIMER COUNTDOWN */
.timer-count {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:110px; font-weight:100; letter-spacing:-4px;
  text-shadow:0 2px 40px rgba(0,0,0,0.5);
  z-index:25; pointer-events:none; display:none;
}

/* CONTROLS DRAWER */
.controls-drawer {
  position:absolute; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(30px) saturate(160%);
  -webkit-backdrop-filter:blur(30px) saturate(160%);
  z-index:40;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:24px;
  opacity:0; pointer-events:none; transition:opacity 0.25s;
}
.controls-drawer.show{opacity:1;pointer-events:auto}
.drawer-grid {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:16px; padding:0 32px; width:100%;
}
.drawer-item {
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:18px; padding:18px 12px;
  display:flex; flex-direction:column;
  align-items:center; gap:10px;
  cursor:pointer; transition:background 0.15s,transform 0.1s;
  font-size:12px; font-weight:500;
  color:rgba(255,255,255,0.85);
}
.drawer-item:active{transform:scale(0.94);background:rgba(255,255,255,0.18)}
.drawer-item.on{background:rgba(255,214,10,0.18);border-color:rgba(255,214,10,0.35);color:var(--yellow)}
.drawer-item svg{width:22px;height:22px}
.drawer-close {
  width:44px; height:44px; border-radius:50%;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.18);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:20px; color:rgba(255,255,255,0.8);
  transition:background 0.15s;
}
.drawer-close:active{background:rgba(255,255,255,0.22)}

/* GALLERY */
.gallery {
  position:absolute; top:0; left:0; right:0; bottom:0;
  background:#000; z-index:50;
  display:none; flex-direction:column;
}
.gallery.show{display:flex}
.gallery-header {
  padding:max(var(--safe-top),16px) 20px 14px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.gallery-header h2{font-size:17px;font-weight:600}
.gallery-close {
  background:none; border:none; color:rgba(255,255,255,0.7);
  font-size:15px; font-weight:500; cursor:pointer;
  padding:6px 10px;
}
.gallery-grid {
  flex:1; overflow-y:auto;
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:2px; padding:2px;
}
.gallery-item {
  aspect-ratio:1; overflow:hidden; cursor:pointer;
  position:relative; background:#111;
}
.gallery-item img,.gallery-item video{width:100%;height:100%;object-fit:cover;display:block}
.gallery-item .vid-badge {
  position:absolute; bottom:5px; left:6px;
  background:rgba(0,0,0,0.6); border-radius:4px;
  padding:2px 5px; font-size:10px; font-weight:600;
}
.gallery-empty {
  flex:1; display:flex; align-items:center; justify-content:center;
  color:rgba(255,255,255,0.3); font-size:15px;
}

/* VIEWER */
.viewer {
  position:absolute; top:0; left:0; right:0; bottom:0;
  background:#000; z-index:60;
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
}
.viewer.show{display:flex}
.viewer-header {
  position:absolute; top:0; left:0; right:0;
  padding:max(var(--safe-top),16px) 16px 14px;
  display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(180deg,rgba(0,0,0,0.7) 0%,transparent 100%);
}
.viewer-close {
  background:rgba(0,0,0,0.4); border:none;
  color:#fff; width:34px; height:34px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px;
}
.viewer-download {
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.2);
  color:#fff; padding:7px 16px; border-radius:20px;
  font-size:13px; font-weight:600; cursor:pointer;
  text-decoration:none; display:flex; align-items:center; gap:5px;
  transition:background 0.15s;
}
.viewer-download:active{background:rgba(255,255,255,0.25)}
.viewer img, .viewer video {
  max-width:100%; max-height:100%; object-fit:contain;
}
</style>
</head>
<body>

<!-- VIEWFINDER -->
<div class="viewfinder" id="viewfinder">
  <video id="video" autoplay muted playsinline></video>
  <div class="cam-error" id="camError">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <line x1="2" y1="2" x2="22" y2="22"/>
    </svg>
    <b id="camErrorTitle">Kamera tidak bisa diakses</b>
    <span id="camErrorMsg">Pastikan halaman dibuka lewat HTTPS atau localhost, dan izin kamera sudah diaktifkan.</span>
  </div>
</div>

<div class="focus-ring" id="focusRing"></div>
<div class="capture-flash" id="captureFlash"></div>
<div class="timer-count" id="timerCount"></div>

<!-- REC TIMER -->
<div class="rec-timer" id="recTimer">
  <div class="rec-dot"></div>
  <span id="recTime">00:00</span>
</div>

<!-- TOP RIGHT -->
<button class="top-controls-btn" id="gridBtn">
  <svg viewBox="0 0 24 24" fill="currentColor">
    <circle cx="5" cy="5" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="19" cy="5" r="1.5"/>
    <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
    <circle cx="5" cy="19" r="1.5"/><circle cx="12" cy="19" r="1.5"/><circle cx="19" cy="19" r="1.5"/>
  </svg>
</button>

<!-- QUALITY BADGE -->
<button class="quality-badge" id="qualityBadge">FHD · 30</button>

<!-- ZOOM -->
<div class="zoom-row">
  <button class="zoom-btn" data-zoom="0.5">0.5</button>
  <button class="zoom-btn active" data-zoom="1">1×</button>
  <button class="zoom-btn" data-zoom="2">2</button>
  <button class="zoom-btn" data-zoom="3">3</button>
</div>

<!-- SHUTTER AREA -->
<div class="shutter-area">
  <div class="mode-row">
    <button class="mode-chip" data-mode="video">VIDEO</button>
    <button class="mode-chip active" data-mode="photo">FOTO</button>
  </div>
  <div class="controls-row">
    <div class="thumb" id="thumb">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>
    <div class="shutter-wrap">
      <div class="shutter-ring"></div>
      <button class="shutter-btn" id="shutterBtn"></button>
    </div>
    <button class="flip-btn" id="flipBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
    </button>
  </div>
</div>

<!-- CONTROLS DRAWER -->
<div class="controls-drawer" id="controlsDrawer">
  <div class="drawer-grid">
    <div class="drawer-item" id="dFlash">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>Flash
    </div>
    <div class="drawer-item" id="dNight">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>Night
    </div>
    <div class="drawer-item" id="dLive">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="7" stroke-dasharray="2 3"/>
      </svg>Live
    </div>
    <div class="drawer-item" id="dTimer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="13" r="8"/><polyline points="12 9 12 13 14 15"/>
        <line x1="9" y1="2" x2="15" y2="2"/>
      </svg><span id="dTimerLabel">Timer</span>
    </div>
    <div class="drawer-item" id="dGrid">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="2" x2="8" y2="22"/><line x1="16" y1="2" x2="16" y2="22"/>
        <line x1="2" y1="8" x2="22" y2="8"/><line x1="2" y1="16" x2="22" y2="16"/>
      </svg>Grid
    </div>
    <div class="drawer-item" id="dFormat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 9h18M9 21V9"/>
      </svg>JPEG
    </div>
    <div class="drawer-item" id="dQuality">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="14" height="12" rx="2"/><path d="M22 8.5v7L16 13z"/>
      </svg><span id="dQualityLabel">FHD</span>
    </div>
    <div class="drawer-item" id="dFps">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
      </svg><span id="dFpsLabel">30fps</span>
    </div>
    <div class="drawer-item" id="dLenses">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M3 12a9 9 0 0 1 18 0"/><path d="M5.6 18.4a9 9 0 0 1 12.8 0"/>
      </svg>Lenses
    </div>
  </div>
  <div class="drawer-close" id="drawerClose">✕</div>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery">
  <div class="gallery-header">
    <h2>Recents</h2>
    <button class="gallery-close" id="galleryClose">Done</button>
  </div>
  <div class="gallery-grid" id="galleryGrid"></div>
  <div class="gallery-empty" id="galleryEmpty">No photos yet</div>
</div>

<!-- VIEWER -->
<div class="viewer" id="viewer">
  <div class="viewer-header">
    <button class="viewer-close" id="viewerClose">✕</button>
    <a class="viewer-download" id="viewerDownload" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="14" height="14">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Save
    </a>
  </div>
  <div id="viewerContent"></div>
</div>

<script>
const $ = id => document.getElementById(id);
let mode = 'photo';
let facingMode = 'environment';
let isFlipping = false;
let isRecording = false;
let videoStream = null;
let mediaRecorder = null;
let recordedChunks = [];
let recInterval = null;
let recSeconds = 0;
let timerIdx = 0;
const timerCycles = [0,3,10];
let gridOn = false;
let currentZoom = 1;
let capturedPhotos = []; // {type:'photo'|'video', url, blob}

// ── REAL ULTRA-WIDE LENS DETECTION ──
// Some devices (mainly newer iPhones via Safari) expose the ultra-wide lens
// as its own camera device. If found, 0.5x switches to it for real;
// otherwise it falls back gracefully (no fake zoom-out).
let ultraWideDeviceId = null;
let forceDeviceId = null;
let lensesDetected = false;

async function detectLenses() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const backCams = devices.filter(d => d.kind === 'videoinput' && !/front|face|user/i.test(d.label));
    const uw = backCams.find(d => /ultra ?wide/i.test(d.label));
    if (uw) {
      ultraWideDeviceId = uw.deviceId; // iOS Safari usually labels this clearly
    } else if (backCams.length > 1) {
      // Android/Chrome usually gives no lens info in the label at all.
      // Best-effort guess: try the 2nd enumerated back camera (often the
      // ultra-wide on multi-lens phones) — not guaranteed, see "Lenses" in settings.
      ultraWideDeviceId = backCams[1].deviceId;
    } else {
      ultraWideDeviceId = null;
    }
  } catch(e) {}
}

// ── QUALITY / FPS PRESETS ──
const qualityPresets = [
  { label:'HD',  width:1280, height:720  },
  { label:'FHD', width:1920, height:1080 },
  { label:'4K',  width:3840, height:2160 }
];
let qualityIdx = 1; // default FHD
const fpsPresets = [24, 30, 60];
let fpsIdx = 1; // default 30fps

function updateQualityBadge() {
  $('qualityBadge').textContent = `${qualityPresets[qualityIdx].label} · ${fpsPresets[fpsIdx]}`;
}

// ── CAMERA ──
let cameraSwitchToken = 0;

async function startCamera() {
  const myToken = ++cameraSwitchToken; // marks this as the latest requested switch
  const q = qualityPresets[qualityIdx];
  const videoConstraints = forceDeviceId
    ? { deviceId: { exact: forceDeviceId }, width: { ideal: q.width }, height: { ideal: q.height }, frameRate: { ideal: fpsPresets[fpsIdx] } }
    : { facingMode, width: { ideal: q.width }, height: { ideal: q.height }, frameRate: { ideal: fpsPresets[fpsIdx] } };
  const constraints = {
    video: videoConstraints,
    audio: false // mic is only requested when recording actually starts (see startRecord)
  };
  const vid = $('video');
  try {
    // Get the new stream BEFORE touching the old one, so the preview never
    // goes blank — old frames keep showing right up until the new feed is ready.
    const newStream = await navigator.mediaDevices.getUserMedia(constraints);
    if (myToken !== cameraSwitchToken) {
      // A newer switch was requested while this one was still loading (e.g. rapid
      // zoom taps) — discard this stale result instead of letting it fight for control.
      newStream.getTracks().forEach(t => t.stop());
      return;
    }
    vid.style.opacity = '0.15'; // brief dip masks the hardware switch instead of a hard cut
    if (videoStream) videoStream.getTracks().forEach(t => t.stop());
    videoStream = newStream;
    vid.srcObject = videoStream;
    vid.muted = true;
    await vid.play();
    requestAnimationFrame(() => { vid.style.opacity = '1'; });
    $('camError').classList.remove('show');
    if (!lensesDetected) { lensesDetected = true; detectLenses(); }
  } catch(e) {
    if (myToken === cameraSwitchToken) {
      console.warn('Camera error:', e);
      showCamError(e);
    }
  }
}
startCamera();

function showCamError(e) {
  let title = 'Kamera tidak bisa diakses';
  let msg = 'Pastikan halaman dibuka lewat HTTPS atau localhost, dan izin kamera sudah diaktifkan.';
  if (!window.isSecureContext) {
    msg = 'Halaman ini harus dibuka lewat HTTPS atau localhost — getUserMedia diblokir di koneksi biasa (http:// atau file://).';
  } else if (e && e.name === 'NotAllowedError') {
    title = 'Izin kamera ditolak';
    msg = 'Buka pengaturan browser, izinkan akses kamera untuk halaman ini, lalu reload.';
  } else if (e && e.name === 'NotFoundError') {
    title = 'Kamera tidak ditemukan';
    msg = 'Device ini sepertinya tidak punya kamera, atau sedang dipakai aplikasi lain.';
  } else if (e && e.name === 'NotReadableError') {
    title = 'Kamera sedang dipakai';
    msg = 'Tutup aplikasi/tab lain yang mungkin sedang menggunakan kamera, lalu reload.';
  }
  $('camErrorTitle').textContent = title;
  $('camErrorMsg').textContent = msg;
  $('camError').classList.add('show');
}

// ── MODE ──
document.querySelectorAll('.mode-chip').forEach(btn => {
  btn.addEventListener('click', async () => {
    if (isRecording) return;
    document.querySelectorAll('.mode-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    $('shutterBtn').classList.toggle('video-mode', mode === 'video');
    await startCamera();
  });
});

// ── ZOOM ──
document.querySelectorAll('.zoom-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.zoom-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const z = parseFloat(btn.dataset.zoom);
    applyZoom(z);
  });
});

function applyZoom(z) {
  currentZoom = z;

  // 0.5x: try switching to the real ultra-wide lens (if this device exposes one)
  if (z <= 0.5 && facingMode === 'environment' && ultraWideDeviceId && forceDeviceId !== ultraWideDeviceId) {
    forceDeviceId = ultraWideDeviceId;
    startCamera();
    return;
  }
  // Leaving 0.5x: switch back off the ultra-wide device to the normal lens
  if (z > 0.5 && forceDeviceId === ultraWideDeviceId) {
    forceDeviceId = null;
    startCamera().then(() => {
      if (currentZoom === z) applyZoomConstraintOrCss(z); // skip if a newer zoom tap superseded this one
    });
    return;
  }
  applyZoomConstraintOrCss(z);
}

function applyZoomConstraintOrCss(z) {
  if (videoStream) {
    const track = videoStream.getVideoTracks()[0];
    if (track) {
      try {
        const caps = track.getCapabilities();
        if (caps.zoom) {
          const clamp = Math.min(Math.max(z, caps.zoom.min), caps.zoom.max);
          track.applyConstraints({ advanced: [{ zoom: clamp }] });
          return;
        }
      } catch(e) {}
    }
  }
  applyVideoTransform();
}

// Combines mirror (front camera) + CSS zoom fallback so neither overwrites the other
function applyVideoTransform() {
  const mirror = facingMode === 'user' ? 'scaleX(-1)' : '';
  const zoomScale = Math.max(1, currentZoom);
  const zoomPart = zoomScale !== 1 ? `scale(${zoomScale})` : '';
  $('video').style.transform = [mirror, zoomPart].filter(Boolean).join(' ');
}

// ── FLIP ──
$('flipBtn').addEventListener('click', async () => {
  if (isFlipping || isRecording) return;
  isFlipping = true;
  $('flipBtn').classList.add('spin');
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  forceDeviceId = null; // ultra-wide only applies to the rear camera
  await startCamera();
  applyZoom(currentZoom);
  setTimeout(() => { $('flipBtn').classList.remove('spin'); isFlipping = false; }, 350);
});

// ── TAP FOCUS ──
$('viewfinder').addEventListener('pointerdown', e => {
  if (e.target.closest('button,.shutter-area,.zoom-row,.controls-drawer,.gallery,.viewer')) return;
  const ring = $('focusRing');
  ring.style.left = e.clientX + 'px';
  ring.style.top = e.clientY + 'px';
  ring.classList.remove('show','fade');
  void ring.offsetWidth;
  ring.classList.add('show');
  // Try real focus
  if (videoStream) {
    const track = videoStream.getVideoTracks()[0];
    try {
      const caps = track.getCapabilities();
      if (caps.focusMode && caps.focusMode.includes('manual')) {
        // point of interest
        const vw = window.innerWidth, vh = window.innerHeight;
        track.applyConstraints({ advanced: [{ pointsOfInterest: [{ x: e.clientX/vw, y: e.clientY/vh }], focusMode: 'single-shot' }] });
      }
    } catch(err) {}
  }
  setTimeout(() => ring.classList.add('fade'), 2000);
  setTimeout(() => ring.classList.remove('show','fade'), 3200);
});

// ── SHUTTER ──
$('shutterBtn').addEventListener('click', () => {
  if (mode === 'video') { toggleRecord(); return; }
  const t = timerCycles[timerIdx];
  t > 0 ? runTimer(t) : snap();
});

// ── SNAP PHOTO ──
function snap() {
  const fl = $('captureFlash');
  fl.classList.remove('go'); void fl.offsetWidth; fl.classList.add('go');

  const canvas = document.createElement('canvas');
  const vid = $('video');
  canvas.width = vid.videoWidth || 1280;
  canvas.height = vid.videoHeight || 720;
  const ctx = canvas.getContext('2d');
  if (facingMode === 'user') { ctx.translate(canvas.width,0); ctx.scale(-1,1); }
  ctx.drawImage(vid, 0, 0, canvas.width, canvas.height);

  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    capturedPhotos.unshift({ type:'photo', url, blob, filename:'photo_'+Date.now()+'.jpg' });
    updateThumb(url, 'photo');
  }, 'image/jpeg', 0.95);
}

// ── RECORD VIDEO ──
function toggleRecord() {
  if (!isRecording) startRecord();
  else stopRecord();
}

function startRecord() {
  if (!videoStream) return;
  recordedChunks = [];
  const mimeType = getSupportedMime();
  const q = qualityPresets[qualityIdx];
  const videoConstraints = forceDeviceId
    ? { deviceId: { exact: forceDeviceId }, width:{ideal:q.width}, height:{ideal:q.height}, frameRate:{ideal:fpsPresets[fpsIdx]} }
    : { facingMode, width:{ideal:q.width}, height:{ideal:q.height}, frameRate:{ideal:fpsPresets[fpsIdx]} };
  try {
    // Re-get stream with audio for video
    navigator.mediaDevices.getUserMedia({
      video: videoConstraints,
      audio: true
    }).then(stream => {
      videoStream.getTracks().forEach(t => t.stop());
      videoStream = stream;
      $('video').srcObject = stream;
      $('video').muted = true;

      mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = saveVideo;
      mediaRecorder.start(100);

      isRecording = true;
      $('shutterBtn').classList.add('recording');
      $('recTimer').classList.add('show');
      recSeconds = 0;
      recInterval = setInterval(() => {
        recSeconds++;
        const m = String(Math.floor(recSeconds/60)).padStart(2,'0');
        const s = String(recSeconds%60).padStart(2,'0');
        $('recTime').textContent = m+':'+s;
      }, 1000);
    }).catch(e => console.warn(e));
  } catch(e) { console.warn(e); }
}

function stopRecord() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  $('shutterBtn').classList.remove('recording');
  $('recTimer').classList.remove('show');
  clearInterval(recInterval);
}

function saveVideo() {
  const mimeType = getSupportedMime() || 'video/webm';
  const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
  const blob = new Blob(recordedChunks, { type: mimeType });
  const url = URL.createObjectURL(blob);
  capturedPhotos.unshift({ type:'video', url, blob, filename:'video_'+Date.now()+'.'+ext });
  updateThumb(url, 'video');
  // Recording is done — drop back to a video-only stream so the mic isn't left listening
  startCamera().then(() => applyZoom(currentZoom));
}

function getSupportedMime() {
  const types = ['video/mp4;codecs=h264','video/webm;codecs=h264','video/webm;codecs=vp9','video/webm'];
  return types.find(t => MediaRecorder.isTypeSupported(t)) || '';
}

// ── TIMER ──
function runTimer(sec) {
  let n = sec;
  const el = $('timerCount');
  el.style.display = 'block'; el.textContent = n;
  const iv = setInterval(() => {
    n--; el.textContent = n || '';
    if (n <= 0) { clearInterval(iv); el.style.display = 'none'; snap(); }
  }, 1000);
}

// ── THUMB ──
function updateThumb(url, type) {
  const t = $('thumb');
  if (type === 'photo') {
    t.innerHTML = `<img src="${url}" alt="">`;
  } else {
    t.innerHTML = `<video src="${url}" style="width:100%;height:100%;object-fit:cover"></video>`;
  }
}

// ── GALLERY ──
$('thumb').addEventListener('click', openGallery);

function openGallery() {
  const grid = $('galleryGrid');
  const empty = $('galleryEmpty');
  grid.innerHTML = '';
  if (capturedPhotos.length === 0) {
    empty.style.display = 'flex'; grid.style.display = 'none';
  } else {
    empty.style.display = 'none'; grid.style.display = 'grid';
    capturedPhotos.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'gallery-item';
      if (item.type === 'photo') {
        div.innerHTML = `<img src="${item.url}" loading="lazy">`;
      } else {
        div.innerHTML = `<video src="${item.url}" muted playsinline></video><div class="vid-badge">VID</div>`;
      }
      div.addEventListener('click', () => openViewer(item));
      grid.appendChild(div);
    });
  }
  $('gallery').classList.add('show');
}

$('galleryClose').addEventListener('click', () => $('gallery').classList.remove('show'));

// ── VIEWER ──
function openViewer(item) {
  const content = $('viewerContent');
  const dl = $('viewerDownload');
  content.innerHTML = '';
  if (item.type === 'photo') {
    content.innerHTML = `<img src="${item.url}" style="max-width:100vw;max-height:100vh">`;
  } else {
    content.innerHTML = `<video src="${item.url}" controls autoplay style="max-width:100vw;max-height:100vh"></video>`;
  }
  dl.href = item.url;
  dl.download = item.filename;
  $('viewer').classList.add('show');
}

$('viewerClose').addEventListener('click', () => {
  $('viewer').classList.remove('show');
  const vid = $('viewerContent').querySelector('video');
  if (vid) vid.pause();
});

// ── DRAWER ──
$('gridBtn').addEventListener('click', () => $('controlsDrawer').classList.add('show'));
$('drawerClose').addEventListener('click', () => $('controlsDrawer').classList.remove('show'));
['dFlash','dNight','dLive'].forEach(id => {
  $(id).addEventListener('click', () => $(id).classList.toggle('on'));
});
$('dTimer').addEventListener('click', () => {
  timerIdx = (timerIdx+1) % timerCycles.length;
  const t = timerCycles[timerIdx];
  $('dTimerLabel').textContent = t===0 ? 'Timer' : `${t}s`;
  $('dTimer').classList.toggle('on', t>0);
});
$('dGrid').addEventListener('click', () => {
  $('dGrid').classList.toggle('on');
  gridOn = $('dGrid').classList.contains('on');
  let g = document.getElementById('gridLines');
  if (!g) {
    g = document.createElement('div'); g.id = 'gridLines';
    g.style.cssText = `position:absolute;inset:0;pointer-events:none;z-index:4;background-image:linear-gradient(rgba(255,255,255,0.18) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.18) 1px,transparent 1px);background-size:33.33% 33.33%;`;
    document.body.appendChild(g);
  }
  g.style.display = gridOn ? 'block' : 'none';
});

// ── QUALITY (HD / FHD / 4K) ──
$('dQuality').addEventListener('click', async () => {
  if (isRecording) return;
  qualityIdx = (qualityIdx + 1) % qualityPresets.length;
  $('dQualityLabel').textContent = qualityPresets[qualityIdx].label;
  $('dQuality').classList.toggle('on', qualityIdx !== 1);
  updateQualityBadge();
  await startCamera();
  applyZoom(currentZoom);
});

// ── FRAME RATE ──
$('dFps').addEventListener('click', async () => {
  if (isRecording) return;
  fpsIdx = (fpsIdx + 1) % fpsPresets.length;
  $('dFpsLabel').textContent = fpsPresets[fpsIdx] + 'fps';
  $('dFps').classList.toggle('on', fpsIdx !== 1);
  updateQualityBadge();
  await startCamera();
  applyZoom(currentZoom);
});

// Tapping the badge opens the same drawer
$('qualityBadge').addEventListener('click', () => $('controlsDrawer').classList.add('show'));
updateQualityBadge();

// ── LENSES DIAGNOSTIC ──
// Shows exactly what the browser reports, since Android/Chrome often
// gives no descriptive label for ultra-wide vs normal lens.
$('dLenses').addEventListener('click', async () => {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === 'videoinput');
    if (!cams.length) { alert('Belum ada kamera terdeteksi. Coba buka kamera dulu.'); return; }
    const list = cams.map((d, i) => `${i + 1}. ${d.label || '(tanpa label)'}`).join('\n');
    alert('Kamera yang terdeteksi browser:\n\n' + list);
  } catch(e) {
    alert('Gagal membaca daftar kamera: ' + e.message);
  }
});
</script>
</body>
</html>
